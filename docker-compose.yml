services:
  mongo:
    image: mongo:7
    container_name: executor-mongo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: executor-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: executor-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3018
      MONGODB_URI: mongodb://mongo:27017/executor
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SOCKET_CORS_ORIGIN: "*"
    ports:
      - "3018:3018"
    volumes:
      - ./reports:/app/reports

volumes:
  mongo_data:
  redis_data:

